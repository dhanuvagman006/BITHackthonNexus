<!DOCTYPE html>
<html>
<head>
    <title>PhoenixVault | Self-Healing Infrastructure</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { margin-bottom: 20px; font-weight: 300; }
        .status { color: #10b981; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 30px;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #dc2626;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        .description {
            color: #94a3b8;
            margin-top: 20px;
            max-width: 400px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Status: <span class="status">{{ status }}</span></h1>
        <p class="description">PhoenixVault Self-Healing AI is currently monitoring this instance for ransomware activity and file corruption.</p>
        <button onclick="simulateCrash()" class="btn">Simulate Corruption (Crash)</button>
    </div>

    <script>
        function simulateCrash() {
            if(confirm("This will simulate a fatal system crash. The Self-Healing Manager will detect this and recover the system from a pristine backup. Proceed?")) {
                fetch('/crash').then(() => {
                    alert("System Crashing... Watch the terminal for recovery logs.");
                    location.reload();
                }).catch(() => {
                    // Expecting failure since the server stops
                    setTimeout(() => location.reload(), 3000);
                });
            }
        }
    </script>
</body>
</html>
